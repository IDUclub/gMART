services:
  idu_agents:
    image: ${AGENTS_IMAGE}
    container_name: ${AGENTS_CONTAINER_NAME}
    restart: always
    ports:
      - "80:80"
    environment:
      OLLAMA_API_URL: ${OLLAMA_API_URL}
      IDU_MCP_SERVER: ${IDU_MCP_SERVER}
      OBJECTS_EFFECTS_MCP_SERVER: ${OBJECTS_EFFECTS_MCP_SERVER}
      DVD_MCP_SERVER: ${DVD_MCP_SERVER}
      NORM_GRAPH_MCP_SERVER: ${NORM_GRAPH_MCP_SERVER}
      URBAN_DATA_MCP_SERVER: ${URBAN_DATA_MCP_SERVER}
      CHAT_STORAGE: ${CHAT_STORAGE}
      URBAN_API_URL: ${URBAN_API_URL}
      REDIS_URL: ${REDIS_URL}
      SYSTEM_PASSWORD: ${SYSTEM_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:80/ping')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  idu_mcp:
    image: ${MCP_IMAGE}
    container_name: ${MCP_CONTAINER_NAME}
    restart: always
    ports:
      - "8000:8000"
    environment:
      URBAN_API_URL: ${URBAN_API_URL}
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
