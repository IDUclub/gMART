[project]
name = "pfinder"
version = "0.1.0"
description = "First look on fastmcp with uv"
readme = "README.md"
requires-python = ">=3.11,<4.0"
dependencies = [
    "aiohttp>=3.13.3",
    "dotenv>=0.9.9",
    "fastapi>=0.135.1",
    "fastmcp>=3.1.1",
    "geojson-pydantic>=2.1.0",
    "geopandas>=1.1.3",
    "ipykernel>=7.2.0",
    "loguru>=0.7.3",
    "ollama>=0.6.1",
    "pre-commit>=4.5.1",
    "uvicorn>=0.42.0",
]

[dependency-groups]
dev = [
    "ipykernel>=7.2.0",
    "jupyterlab>=4.5.6",
    "branca (>=0.8.2,<0.9.0)",
    "folium (>=0.12)",
    "matplotlib (>=3.10.8,<4.0.0)",
    "mapclassify (>=2.10.0,<3.0.0)",
]


