[project]
name = "gMART"
version = "0.7.0"
description = "First look on fastmcp with uv"
readme = "README.md"
requires-python = ">=3.11,<4.0"
dependencies = [
    "aiohttp>=3.13.5",
    "dotenv>=0.9.9",
    "fastapi>=0.136.3",
    "fastmcp>=3.3.1",
    "geojson-pydantic>=2.1.1",
    "geopandas>=1.1.3",
    "ipykernel>=7.2.0",
    "loguru>=0.7.3",
    "ollama>=0.6.2",
    "pandas>=3.0.3",
    "python-a2a>=0.5.10",
    "redis>=7.4.0",
    "uvicorn>=0.48.0",
    "pydantic>=2.13.4",
    "fastmcp-docs>=1.0.0",
    "starlette>=1.2.1",
]

[dependency-groups]
dev = [
    "ipykernel>=7.2.0",
    "jupyterlab>=4.5.7",
    "branca (>=0.8.2,<0.9.0)",
    "folium (>=0.12)",
    "matplotlib (>=3.10.9,<4.0.0)",
    "mapclassify (>=2.10.0,<3.0.0)",
    "pre-commit>=4.6.0",
]
