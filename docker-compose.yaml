version: "3.9"

services:

  idu_agents:
    build:
      context: .
      dockerfile: docker/Dockerfile-agents
    container_name: agents
    ports:
      - "80:80"
    env_file:
      - ./env/.env.agents.example
    depends_on:
      pipeline_storage:
        condition: service_healthy
      idu_mcp:
        condition: service_healthy
    networks:
      - localnet

  idu_mcp:
    build:
      context: .
      dockerfile: docker/Dockerfile-mcp
    container_name: idumcp
    ports:
      - "8000:8000"
    env_file:
      - ./env/.env.idu_mcp.example
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - localnet

  pipeline_storage:
    image: redis:7-alpine
    container_name: pipeline_storage
    ports:
      - "6379:6379"
    environment:
      REDIS_PASSWORD: example_password
    command: redis-server --save "" --appendonly no --requirepass example_password
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a example_password --no-auth-warning ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - localnet

networks:
  localnet:
    external: true
