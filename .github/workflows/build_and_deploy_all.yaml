name: build and deploy all

on:
  workflow_dispatch:

env:
  AGENTS_IMAGE_NAME: ${{ secrets.REGISTRY }}/idu_agents
  MCP_IMAGE_NAME: ${{ secrets.REGISTRY }}/idu_mcp
  AGENTS_CONTAINER_NAME: idu_agents
  MCP_CONTAINER_NAME: idu_mcp

jobs:
  build:
    runs-on: 99_runner
    outputs:
      now: ${{ steps.date.outputs.now }}

    steps:
      - name: Set current date
        id: date
        run: echo "now=$(date +'%Y-%m-%dT%H-%M-%S')" >> $GITHUB_OUTPUT

      - name: Checkout
        uses: actions/checkout@v4

      - name: Build images
        env:
          NOW: ${{ steps.date.outputs.now }}
        run: |
          docker build -t "$AGENTS_IMAGE_NAME:$NOW" -f docker/Dockerfile-agents .
          docker build -t "$MCP_IMAGE_NAME:$NOW" -f docker/Dockerfile-mcp .

      - name: Push images
        env:
          NOW: ${{ steps.date.outputs.now }}
        run: |
          docker push "$AGENTS_IMAGE_NAME:$NOW"
          docker push "$MCP_IMAGE_NAME:$NOW"

  stop_container:
    runs-on: 99_runner
    needs: build

    steps:
      - name: Stop containers
        run: |
          docker rm -f "$AGENTS_CONTAINER_NAME" || true
          docker rm -f "$MCP_CONTAINER_NAME" || true

  run_container:
    runs-on: 99_runner
    needs: [build, stop_container]
    environment: production

    env:
      NOW: ${{ needs.build.outputs.now }}

    steps:
      - name: Set image env
        run: |
          echo "AGENTS_IMAGE=$AGENTS_IMAGE_NAME:$NOW" >> $GITHUB_ENV
          echo "MCP_IMAGE=$MCP_IMAGE_NAME:$NOW" >> $GITHUB_ENV

      - name: Run containers
        env:
          OLLAMA_API_URL: ${{ vars.OLLAMA_API_URL }}
          IDU_MCP_SERVER: ${{ vars.IDU_MCP_SERVER }}
          OBJECTS_EFFECTS_MCP_SERVER: ${{ vars.OBJECTS_EFFECTS_MCP_SERVER }}
          CHAT_STORAGE: ${{ vars.CHAT_STORAGE }}
          URBAN_API_URL: ${{ vars.URBAN_API_URL }}
          DVD_MCP_SERVER: ${{ vars.DVD_MCP_SERVER }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
          SYSTEM_PASSWORD: ${{ secrets.SYSTEM_PASSWORD }}
        run: docker compose -f docker-compose.actions.yaml up -d --wait --wait-timeout 120

      - name: Container diagnostics
        if: always()
        run: |
          sleep 5
          fail=0
          for c in idu_agents idu_mcp; do
            status=$(docker inspect -f '{{.State.Status}}' "$c" 2>/dev/null || echo missing)
            health=$(docker inspect -f '{{if .State.Health}}{{.State.Health.Status}}{{else}}none{{end}}' "$c" 2>/dev/null || echo n/a)
            count=$(docker inspect -f '{{.RestartCount}}' "$c" 2>/dev/null || echo 0)
            echo "::group::$c (status=$status, health=$health, restarts=$count)"
            docker logs --tail 200 "$c" 2>&1 || true
            echo "::endgroup::"
            if [ "$status" != "running" ] || [ "$count" -gt 0 ]; then
              echo "::error::container $c is unhealthy (status=$status, health=$health, restartCount=$count)"
              fail=1
            fi
          done
          exit $fail
